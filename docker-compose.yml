# ===========================================================================
# Yarn Procurement Portal — production compose (honocode / Ubuntu)
# Matches this host's pattern: app container publishes NO host ports; it joins
# the shared Docker network where `nginx_proxy` (edge, owns :80/:443) and
# `postgres_common` (shared DB) live. nginx_proxy routes to it by name (ypp:4043);
# the app connects to the DB as postgres_common:5432.
# ===========================================================================
services:
  app:
    build: .
    image: yarn-procurement-portal:latest
    container_name: ypp
    restart: unless-stopped

    # All config from the host .env (DB creds, JWT_SECRET, SUPER_ADMIN_*,
    # PUBLIC_BASE_URL, mail) — never baked into the image.
    env_file: .env

    # Internal only — nginx_proxy reaches this over the shared network.
    expose:
      - "4043"

    networks:
      - shared_proxy

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4043/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # The existing shared network nginx_proxy + postgres_common are on.
  shared_proxy:
    external: true
