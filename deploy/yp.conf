# Yarn Procurement Portal — edge nginx_proxy site (yp.ddecor.com)
# Deploy as: /data/nginx-proxy/conf.d/yp.conf
# Reload:    docker exec nginx_proxy nginx -t && docker exec nginx_proxy nginx -s reload
# Routes to the YPP container (ypp:4043) over the shared_proxy network.
# Mirrors portal.conf conventions (TLS, HSTS, edge rate-limiting).

# Rate-limit zones (http context). 10 MB ~= 160k unique IPs.
limit_req_zone $binary_remote_addr zone=yp_auth:10m   rate=10r/m;   # /api/auth/*   — login
limit_req_zone $binary_remote_addr zone=yp_portal:10m rate=30r/m;   # /api/portal/* — public vendor links (token brute-force guard)
limit_req_zone $binary_remote_addr zone=yp_gen:10m    rate=30r/s;   # everything else — safety net
limit_req_status 429;

server {
    listen 80;
    server_name yp.ddecor.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2  on;
    server_name yp.ddecor.com;

    server_tokens off;

    ssl_certificate     /etc/nginx/certs/yp.ddecor.com.crt;
    ssl_certificate_key /etc/nginx/certs/yp.ddecor.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — only enable after you're confident HTTPS is stable
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # App caps JSON at 2mb; keep the edge aligned.
    client_max_body_size 2m;

    # Login — blunt brute-force
    location /api/auth/ {
        limit_req zone=yp_auth burst=5 nodelay;
        proxy_pass         http://ypp:4043;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host $host;
    }

    # Public vendor quote links (no login) — guard token guessing / spray
    location /api/portal/ {
        limit_req zone=yp_portal burst=10 nodelay;
        proxy_pass         http://ypp:4043;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host $host;
    }

    # Everything else (UI + authenticated API)
    location / {
        limit_req zone=yp_gen burst=20 nodelay;
        proxy_pass         http://ypp:4043;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host $host;
    }
}
